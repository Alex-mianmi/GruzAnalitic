<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Интерактивная презентация маркетинговых аудитов и предложений OptimPRO, Zharkov, GruzTime, ТРАНССКАЙ и 5tones"
    />
    <title>Marketing Intelligence · Аудит сайтов</title>
    <link rel="stylesheet" href="./styles.css?v=20260616-original-links" />
  </head>
  <body>
    <div class="ambient ambient-one"></div>
    <div class="ambient ambient-two"></div>

    <header class="topbar">
      <a class="brand" href="#" aria-label="На первый слайд">
        <span class="brand-mark">MI</span>
        <span class="brand-copy">
          <strong>Marketing Intelligence</strong>
          <small>Executive research · June 2026</small>
        </span>
      </a>

      <nav class="site-tabs" id="site-tabs" aria-label="Выбор сайта"></nav>

      <div class="top-actions">
        <button
          class="chapters-button"
          id="chapters-button"
          type="button"
          aria-controls="chapter-sidebar"
          aria-expanded="false"
        >
          <span class="chapters-icon"><i></i><i></i><i></i></span>
          <span id="mobile-chapter-label">Главы</span>
        </button>
      </div>
    </header>

    <div class="app-shell">
      <aside class="sidebar" id="chapter-sidebar" aria-label="Оглавление презентации">
        <div class="sidebar-head">
          <span class="eyebrow">Главы анализа</span>
          <span class="chapter-count" id="chapter-count">01 / 01</span>
          <button class="sidebar-close" id="sidebar-close" type="button" aria-label="Закрыть оглавление">×</button>
        </div>
        <nav class="chapter-nav" id="chapter-nav" aria-label="Главы анализа"></nav>
        <div class="sidebar-footer">
          <div class="progress-track"><span id="progress-bar"></span></div>
          <p>Навигация: <kbd>←</kbd> <kbd>→</kbd></p>
        </div>
      </aside>
      <button class="sidebar-backdrop" id="sidebar-backdrop" type="button" aria-label="Закрыть оглавление"></button>

      <main class="stage">
        <div class="slide-frame" id="slide-frame">
          <section class="slide" id="slide" aria-live="polite"></section>
        </div>
        <div class="slide-controls">
          <button id="prev-button" type="button" data-slide="0" aria-label="Предыдущая глава">
            <span aria-hidden="true">←</span>
            <b>Назад</b>
          </button>
          <span id="slide-label">01 / 01</span>
          <button id="next-button" type="button" data-slide="0" aria-label="Следующая глава">
            <b>Вперёд</b>
            <span aria-hidden="true">→</span>
          </button>
        </div>
      </main>
    </div>

    <dialog class="evidence-dialog" id="evidence-dialog">
      <button class="dialog-close" id="evidence-dialog-close" type="button" aria-label="Закрыть">×</button>
      <img id="evidence-dialog-image" alt="" />
      <p id="evidence-dialog-caption"></p>
    </dialog>

    <script src="./app.js?v=20260616-original-links"></script>
  </body>
</html>
